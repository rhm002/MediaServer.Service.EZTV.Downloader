management.endpoints.web.exposure.include=health,metrics
spring.main.web-application-type=none
spring.main.banner-mode=off

logging.level.org.mundell.mediaserver.service.eztv.downloader=info

spring.jpa.open-in-view=false
spring.jpa.generate-ddl=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true

# Flyway — disabled; migrations are applied by MediaServer only
spring.flyway.enabled=false

# Scheduler thread pool
spring.task.scheduling.pool.size=1

# Downloader config
# max-concurrent: max simultaneous torrent downloads
application.downloader.max-concurrent=10
# initial-delay-ms: wait before first poll after startup (ms)
application.downloader.initial-delay-ms=15000
# poll-delay-ms: how often to check for new pending downloads (ms)
application.downloader.poll-delay-ms=60000

# PostgreSQL 17 (default – override per profile)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mediaserver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:media}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:H@rd2F0rg3t01}
